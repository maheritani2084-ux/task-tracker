<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Tracker</title>

    <style>
      :root {
        font-family: "Inter", "Segoe UI", Arial, sans-serif;
        color: #111827;
        background: #f4f7ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 24px;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(59, 130, 246, 0.18), transparent 24%),
          linear-gradient(135deg, #f8fbff 0%, #eef4ff 100%);
        color: #111827;
      }

      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin: 0 auto 24px;
        padding: 22px 24px;
        max-width: 1280px;
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 24px;
        box-shadow: 0 16px 42px rgba(15, 23, 42, 0.08);
      }

      .header-content {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        width: fit-content;
        padding: 5px 10px;
        border-radius: 999px;
        background: linear-gradient(135deg, #dbeafe, #eef2ff);
        color: #4338ca;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .page-header h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1.1;
      }

      .page-header p {
        margin: 0;
        color: #64748b;
        max-width: 640px;
      }

      .page-header-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .stat-pill {
        padding: 9px 12px;
        border-radius: 999px;
        background: #f8fafc;
        color: #334155;
        font-size: 13px;
        font-weight: 600;
        border: 1px solid #e2e8f0;
      }

      .page-header-actions button {
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 999px;
        padding: 10px 16px;
        background: linear-gradient(135deg, #2563eb 0%, #4f46e5 50%, #7c3aed 100%);
        color: #ffffff;
        cursor: pointer;
        box-shadow: 0 12px 24px rgba(79, 70, 229, 0.22);
        transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
        font-weight: 700;
        letter-spacing: 0.01em;
      }

      .page-header-actions button:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 30px rgba(79, 70, 229, 0.28);
        filter: saturate(1.08);
      }

      .board {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
        max-width: 1280px;
        margin: 0 auto;
      }

      .column {
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(226, 232, 240, 0.9);
        border-radius: 20px;
        padding: 16px;
        min-height: 340px;
        box-shadow: 0 12px 35px rgba(15, 23, 42, 0.06);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .column:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      }

      .column h2 {
        margin: 0 0 12px;
        font-size: 18px;
        color: #1f2937;
      }

      .card {
        background: linear-gradient(145deg, #ffffff, #f8fbff);
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        padding: 12px;
        margin-bottom: 10px;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.04);
      }

      .card h3 {
        margin: 0 0 6px;
        font-size: 16px;
        color: #0f172a;
      }

      .card p {
        margin: 0 0 8px;
        color: #475569;
        font-size: 14px;
        line-height: 1.45;
      }

      .meta-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        margin-top: 8px;
        font-size: 13px;
        color: #64748b;
      }

      .pill {
        display: inline-block;
        padding: 4px 9px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }

      .pill-high {
        background: #fee2e2;
        color: #b91c1c;
      }

      .pill-overdue {
        background: #ffe4e6;
        color: #9f1239;
        border: 1px solid #fda4af;
      }

      .pill-medium {
        background: #fef3c7;
        color: #b45309;
      }

      .pill-low {
        background: #e2e8f0;
        color: #334155;
      }

      .edit-button {
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 999px;
        padding: 6px 10px;
        background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
        color: #ffffff;
        cursor: pointer;
        box-shadow: 0 8px 16px rgba(37, 99, 235, 0.2);
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }

      .edit-button:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 20px rgba(37, 99, 235, 0.24);
      }

      .card.dragging {
        opacity: 0.6;
      }

      .column.drag-over {
        outline: 2px dashed #2563eb;
        outline-offset: 4px;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.5);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }

      .modal-backdrop.open {
        display: flex;
      }

      .modal {
        background: #ffffff;
        border-radius: 20px;
        width: min(560px, 100%);
        padding: 20px;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.18);
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }

      .modal h2 {
        margin: 0;
        color: #0f172a;
      }

      .close-button {
        border: none;
        border-radius: 999px;
        width: 34px;
        height: 34px;
        background: #f1f5f9;
        color: #475569;
        cursor: pointer;
        font-size: 18px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 12px;
      }

      .field label {
        font-weight: 600;
        color: #334155;
      }

      .field input,
      .field textarea,
      .field select {
        padding: 10px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        background: #f8fafc;
        font: inherit;
      }

      .field input:focus,
      .field textarea:focus,
      .field select:focus {
        outline: 2px solid rgba(37, 99, 235, 0.18);
        border-color: #2563eb;
      }

      .field input.invalid {
        border-color: #b91c1c;
        background: #fef2f2;
      }

      .hint-text {
        color: #64748b;
        font-size: 12px;
      }

      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 14px;
      }

      .modal-actions button {
        border: 1px solid #dbe3f0;
        border-radius: 999px;
        padding: 9px 14px;
        cursor: pointer;
        font-weight: 600;
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }

      .modal-actions button:hover {
        transform: translateY(-1px);
      }

      .modal-actions .primary {
        background: linear-gradient(135deg, #2563eb, #4f46e5);
        color: #ffffff;
        border-color: transparent;
        box-shadow: 0 10px 20px rgba(79, 70, 229, 0.18);
      }

      .error-text {
        color: #b91c1c;
        margin-top: 8px;
        font-size: 14px;
      }

      @media (max-width: 900px) {
        .page-header {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <header class="page-header">
      <div class="header-content">
        <span class="eyebrow">Kanban workspace</span>
        <h1>Task Board</h1>
        <p>Plan work, track progress, and keep priorities clear.</p>
      </div>
      <div class="page-header-actions">
        <div class="stat-pill">Balanced priorities</div>
        <button type="button" id="newTaskButton">New Task</button>
      </div>
    </header>

    <main class="board" id="board"></main>

    <div class="modal-backdrop" id="modalBackdrop">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-header">
          <h2 id="modalTitle">New Task</h2>
          <button type="button" id="closeButton" class="close-button" aria-label="Close">×</button>
        </div>
        <form id="taskForm">
          <input id="taskIdInput" name="taskId" type="hidden" />
          <div class="field">
            <label for="titleInput">Title</label>
            <input id="titleInput" name="title" required />
          </div>
          <div class="field">
            <label for="descriptionInput">Description</label>
            <textarea id="descriptionInput" name="description"></textarea>
          </div>
          <div class="field">
            <label for="statusInput">Status</label>
            <select id="statusInput" name="status"></select>
          </div>
          <div class="field">
            <label for="priorityInput">Priority</label>
            <select id="priorityInput" name="priority"></select>
          </div>
          <div class="field">
            <label for="dueDateInput">Due date</label>
            <input id="dueDateInput" name="due_date" placeholder="YYYY-MM-DD" autocomplete="off" />
            <div class="hint-text">Due date must be YYYY-MM-DD</div>
          </div>
          <div class="field">
            <label for="assigneeInput">Assignee</label>
            <input id="assigneeInput" name="assignee" />
          </div>
          <div id="formError" class="error-text"></div>
          <div class="modal-actions">
            <button type="button" id="cancelButton">Cancel</button>
            <button type="submit" class="primary">Save</button>
          </div>
        </form>
      </div>
    </div>

    <script>
      const columns = [
        { key: 'ToDo', label: 'ToDo' },
        { key: 'InProgress', label: 'InProgress' },
        { key: 'Done', label: 'Done' }
      ];

      const board = document.getElementById('board');
      const modalBackdrop = document.getElementById('modalBackdrop');
      const taskForm = document.getElementById('taskForm');
      const titleInput = document.getElementById('titleInput');
      const descriptionInput = document.getElementById('descriptionInput');
      const statusInput = document.getElementById('statusInput');
      const priorityInput = document.getElementById('priorityInput');
      const dueDateInput = document.getElementById('dueDateInput');
      const assigneeInput = document.getElementById('assigneeInput');
      const taskIdInput = document.getElementById('taskIdInput');
      const modalTitle = document.getElementById('modalTitle');
      const newTaskButton = document.getElementById('newTaskButton');
      const cancelButton = document.getElementById('cancelButton');
      const closeButton = document.getElementById('closeButton');
      const formError = document.getElementById('formError');
      let tasks = [];
      let editingTaskId = null;
      const sampleTasks = [
        {
          title: 'Draft onboarding checklist',
          description: 'Outline the first-run steps for new users.',
          priority: 'High',
          assignee: 'Alex',
          status: 'ToDo'
        },
        {
          title: 'Prepare sprint review notes',
          description: 'Summarize recent wins and open follow-ups.',
          priority: 'Medium',
          assignee: 'Mina',
          status: 'InProgress'
        },
        {
          title: 'Archive completed tasks',
          description: 'Move finished work into the archive bucket.',
          priority: 'Low',
          assignee: 'Unassigned',
          status: 'Done'
        }
      ];

      function escapeHtml(value) {
        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function compareTasks(a, b) {
        const priorityOrder = { High: 0, Medium: 1, Low: 2 };
        const priorityDiff = priorityOrder[a.priority] - priorityOrder[b.priority];
        if (priorityDiff !== 0) {
          return priorityDiff;
        }
        return a.id.localeCompare(b.id);
      }

      function createStateBanner(message, state) {
        const banner = document.createElement('div');
        banner.style.marginBottom = '12px';
        banner.style.padding = '10px 12px';
        banner.style.borderRadius = '8px';
        banner.style.fontSize = '14px';

        if (state === 'loading') {
          banner.style.background = '#eff6ff';
          banner.style.color = '#1d4ed8';
        } else if (state === 'error') {
          banner.style.background = '#fef2f2';
          banner.style.color = '#b91c1c';
        } else {
          banner.style.background = '#f9fafb';
          banner.style.color = '#374151';
        }

        banner.textContent = message;
        return banner;
      }

      function createEmptyPlaceholder() {
        const placeholder = document.createElement('p');
        placeholder.textContent = 'No tasks in this column.';
        placeholder.style.margin = '0';
        placeholder.style.color = '#6b7280';
        placeholder.style.fontSize = '14px';
        return placeholder;
      }

      async function fetchTasks() {
        renderBoard([], 'loading');

        try {
          const response = await fetch('http://localhost:8000/tasks');
          if (!response.ok) {
            throw new Error('Unable to load tasks');
          }

          const data = await response.json();
          tasks = Array.isArray(data) ? data : [];

          if (tasks.length === 0) {
            const createdTasks = [];
            for (const task of sampleTasks) {
              const createResponse = await fetch('http://localhost:8000/tasks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(task)
              });

              if (!createResponse.ok) {
                throw new Error('Unable to seed sample tasks');
              }

              createdTasks.push(await createResponse.json());
            }
            tasks = createdTasks;
          }

          renderBoard(tasks, tasks.length > 0 ? 'ready' : 'empty');
        } catch (error) {
          console.error(error);
          renderBoard([], 'error');
        }
      }

      function populateFormSelects() {
        statusInput.innerHTML = columns.map((column) => `<option value="${column.key}">${column.label}</option>`).join('');
        priorityInput.innerHTML = ['Low', 'Medium', 'High'].map((value) => `<option value="${value}">${value}</option>`).join('');
      }

      function resetForm() {
        taskForm.reset();
        titleInput.value = '';
        descriptionInput.value = '';
        statusInput.value = 'ToDo';
        priorityInput.value = 'Medium';
        dueDateInput.value = '';
        assigneeInput.value = '';
        taskIdInput.value = '';
        dueDateInput.classList.remove('invalid');
      }

      function isValidDueDate(value) {
        if (!value) {
          return true;
        }

        const trimmedValue = value.trim();
        if (!trimmedValue) {
          return true;
        }

        const match = /^(\d{4})-(\d{2})-(\d{2})$/.exec(trimmedValue);
        if (!match) {
          return false;
        }

        const [, yearText, monthText, dayText] = match;
        const year = Number(yearText);
        const month = Number(monthText);
        const day = Number(dayText);
        const parsedDate = new Date(Date.UTC(year, month - 1, day));

        return parsedDate.getUTCFullYear() === year
          && parsedDate.getUTCMonth() === month - 1
          && parsedDate.getUTCDate() === day;
      }

      function validateDueDateInput() {
        const valid = isValidDueDate(dueDateInput.value);
        if (valid) {
          dueDateInput.classList.remove('invalid');
          return true;
        }

        dueDateInput.classList.add('invalid');
        formError.textContent = 'Due date must be YYYY-MM-DD';
        return false;
      }

      function getErrorMessage(errorData) {
        if (typeof errorData?.detail === 'string') {
          return errorData.detail;
        }

        if (Array.isArray(errorData?.detail)) {
          return errorData.detail
            .map((item) => item?.msg || item?.detail || '')
            .filter(Boolean)
            .join(', ');
        }

        return 'Unable to save task.';
      }

      function formatDueDate(taskDueDate) {
        if (!taskDueDate) {
          return 'No due date';
        }

        return escapeHtml(new Date(`${taskDueDate}T00:00:00`).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }));
      }

      function renderDueDateRow(task) {
        const overdueMarkup = task.is_overdue
          ? '<span class="pill pill-overdue" aria-label="Overdue">Overdue</span>'
          : '<span></span>';

        return `
          <div class="meta-row">
            <span class="meta-date">${formatDueDate(task.due_date)}</span>
            ${overdueMarkup}
          </div>
        `;
      }

      function openModal(task = null) {
        formError.textContent = '';

        const taskData = task ?? {};
        const isEditing = Boolean(task);

        modalTitle.textContent = isEditing ? 'Edit Task' : 'New Task';
        taskIdInput.value = task?.id ?? '';
        titleInput.value = taskData.title ?? '';
        descriptionInput.value = taskData.description ?? '';
        statusInput.value = taskData.status || 'ToDo';
        priorityInput.value = taskData.priority || 'Medium';
        dueDateInput.value = taskData.due_date || '';
        assigneeInput.value = taskData.assignee || '';
        dueDateInput.classList.remove('invalid');

        if (!isEditing) {
          resetForm();
        }

        modalBackdrop.classList.add('open');
      }

      function closeModal() {
        modalBackdrop.classList.remove('open');
        resetForm();
        formError.textContent = '';
        modalTitle.textContent = 'New Task';
      }

      async function saveTask(event) {
        event.preventDefault();

        if (!validateDueDateInput()) {
          return;
        }

        const payload = {
          title: titleInput.value.trim(),
          description: descriptionInput.value,
          status: statusInput.value,
          priority: priorityInput.value,
          due_date: dueDateInput.value.trim() || null,
          assignee: assigneeInput.value.trim() || null,
        };

        if (!payload.title) {
          formError.textContent = 'Title is required';
          return;
        }

        const taskIdentifier = taskIdInput.value;
        const isEditing = Boolean(taskIdentifier);
        const existingTask = isEditing ? tasks.find((item) => item.id === taskIdentifier) : null;

        if (isEditing && existingTask && payload.status === existingTask.status) {
          delete payload.status;
        }

        try {
          const response = await fetch(`http://localhost:8000/tasks${isEditing ? `/${taskIdentifier}` : ''}`, {
            method: isEditing ? 'PATCH' : 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            const errorData = await response.json().catch(() => null);
            formError.textContent = getErrorMessage(errorData);
            return;
          }

          formError.textContent = '';
          closeModal();
          await fetchTasks();
        } catch (error) {
          formError.textContent = 'Unable to save task. Please try again.';
        }
      }

      function createCard(task) {
        const article = document.createElement('article');
        article.className = 'card';
        article.dataset.taskId = task.id;
        article.draggable = true;

        const priorityClass = task.priority === 'High'
          ? 'pill-high'
          : task.priority === 'Medium'
            ? 'pill-medium'
            : 'pill-low';

        article.innerHTML = `
          <h3>${escapeHtml(task.title)}</h3>
          <p>${escapeHtml(task.description || '')}</p>
          <div class="meta-row">
            <span class="pill ${priorityClass}">${escapeHtml(task.priority)}</span>
            <span>${escapeHtml(task.assignee || 'Unassigned')}</span>
          </div>
          ${renderDueDateRow(task)}
          <div class="meta-row">
            <span></span>
            <button class="edit-button" type="button">Edit</button>
          </div>
        `;

        article.querySelector('.edit-button').addEventListener('click', () => openModal(task));

        article.addEventListener('dragstart', (event) => {
          article.classList.add('dragging');
          event.dataTransfer.setData('text/plain', task.id);
          event.dataTransfer.effectAllowed = 'move';
        });

        article.addEventListener('dragend', () => {
          article.classList.remove('dragging');
          document.querySelectorAll('.column').forEach((element) => element.classList.remove('drag-over'));
        });

        return article;
      }

      async function moveTask(taskId, targetStatus) {
        const task = tasks.find((item) => item.id === taskId);
        if (!task || task.status === targetStatus) {
          return;
        }

        const previousStatus = task.status;
        const updatedTasks = tasks.map((item) => {
          if (item.id === taskId) {
            return { ...item, status: targetStatus };
          }
          return item;
        });
        tasks = updatedTasks;
        renderBoard(tasks, tasks.length > 0 ? 'ready' : 'empty');

        try {
          const response = await fetch(`http://localhost:8000/tasks/${taskId}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: targetStatus })
          });

          if (!response.ok) {
            const errorData = await response.json().catch(() => null);
            const detail = errorData?.detail || 'Unable to update task status.';
            tasks = tasks.map((item) => {
              if (item.id === taskId) {
                return { ...item, status: previousStatus };
              }
              return item;
            });
            renderBoard(tasks, 'error', detail);
            return;
          }
        } catch (error) {
          tasks = tasks.map((item) => {
            if (item.id === taskId) {
              return { ...item, status: previousStatus };
            }
            return item;
          });
          renderBoard(tasks, 'error', 'Unable to move task. Please try again.');
        }
      }

      function renderBoard(taskList, state = 'ready', errorMessage = 'Unable to load tasks.') {
        board.innerHTML = '';

        if (state === 'loading') {
          board.appendChild(createStateBanner('Loading tasks…', 'loading'));
        } else if (state === 'error') {
          const errorBanner = createStateBanner(errorMessage, 'error');
          const retryButton = document.createElement('button');
          retryButton.type = 'button';
          retryButton.textContent = 'Retry';
          retryButton.style.marginLeft = '8px';
          retryButton.style.padding = '4px 8px';
          retryButton.style.border = 'none';
          retryButton.style.borderRadius = '6px';
          retryButton.style.background = '#b91c1c';
          retryButton.style.color = '#ffffff';
          retryButton.style.cursor = 'pointer';
          retryButton.addEventListener('click', fetchTasks);
          errorBanner.appendChild(retryButton);
          board.appendChild(errorBanner);
        } else if (state === 'empty') {
          board.appendChild(createStateBanner('No tasks yet.', 'empty'));
        }

        columns.forEach((column) => {
          const columnElement = document.createElement('section');
          columnElement.className = 'column';
          columnElement.setAttribute('data-status', column.key);

          columnElement.addEventListener('dragover', (event) => {
            event.preventDefault();
            columnElement.classList.add('drag-over');
          });

          columnElement.addEventListener('dragleave', () => {
            columnElement.classList.remove('drag-over');
          });

          columnElement.addEventListener('drop', async (event) => {
            event.preventDefault();
            columnElement.classList.remove('drag-over');
            const taskId = event.dataTransfer.getData('text/plain');
            if (!taskId) {
              return;
            }
            const task = tasks.find((item) => item.id === taskId);
            if (!task || task.status === column.key) {
              return;
            }
            await moveTask(taskId, column.key);
          });

          const heading = document.createElement('h2');
          const tasksForColumn = taskList
            .filter((task) => task.status === column.key)
            .sort(compareTasks);
          heading.textContent = `${column.label} (${tasksForColumn.length})`;
          columnElement.appendChild(heading);

          if (tasksForColumn.length === 0) {
            columnElement.appendChild(createEmptyPlaceholder());
          } else {
            tasksForColumn.forEach((task) => {
              columnElement.appendChild(createCard(task));
            });
          }

          board.appendChild(columnElement);
        });
      }

      newTaskButton.addEventListener('click', () => openModal());
      cancelButton.addEventListener('click', closeModal);
      closeButton.addEventListener('click', closeModal);
      modalBackdrop.addEventListener('click', (event) => {
        if (event.target === modalBackdrop) {
          closeModal();
        }
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && modalBackdrop.classList.contains('open')) {
          closeModal();
        }
      });
      taskForm.addEventListener('submit', saveTask);

      populateFormSelects();
      resetForm();
      fetchTasks();
    </script>
  </body>
</html>
